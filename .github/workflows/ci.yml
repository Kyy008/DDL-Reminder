name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-build:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ddl_reminder
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ddl_reminder"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ddl_reminder
      SESSION_SECRET: ci-session-secret
      APP_URL: http://localhost:3000
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_USER: ci-user
      SMTP_PASS: ci-pass
      MAIL_FROM: DDL Reminder <reminder@example.com>
      TZ: Asia/Shanghai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run production build
        run: npm run build
